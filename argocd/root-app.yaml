apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-argocd-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tim275/kubecraft # Corrected repoURL
    targetRevision: HEAD
    path: argocd/appsets/qa-appset.yaml # Corrected path
    #path: argocd/appsets/production.yaml
    #path: argocd/appsets/staging-appset.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
