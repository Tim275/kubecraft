apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator-with-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    chart: cloudnative-pg
    repoURL: https://cloudnative-pg.github.io/charts
    targetRevision: 0.20.1 # Neueste stabile Version
    helm:
      values: |
        grafana:
          dashboards:
            enabled: true
            namespace: monitoring  # Ziel-Namespace für Dashboards

        webhooks:
          enabled: true  # Nur im Operator-Application aktivieren

        # Critical Fix: Verhindert Ressourcen-Überlappung
        fullnameOverride: "cnpg-operator"
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system # Dedizierter Operator-Namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
