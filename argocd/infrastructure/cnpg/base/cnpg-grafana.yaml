apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-grafana-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    chart: cloudnative-pg-grafana-dashboards # Korrekter Chart-Name
    repoURL: https://cloudnative-pg.github.io/charts # Offizielles Helm-Repo
    targetRevision: 0.0.4 # Aktuelle Version (Stand: Juli 2024)
    helm:
      values: |
        grafana:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
