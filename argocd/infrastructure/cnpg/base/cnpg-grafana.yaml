apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-grafana-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    chart: cloudnative-pg-dashboards # Correct chart name
    repoURL: https://cloudnative-pg.github.io/grafana-dashboards # Correct repo URL
    targetRevision: 0.0.3 # Same version Mischa uses
    helm:
      values: |
        grafana:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring # Correct namespace, matching Mischa's setup
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
